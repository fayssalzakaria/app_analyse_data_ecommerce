name: Sync vers Hugging Face Space

# À chaque push sur main (et manuellement), pousse le dépôt vers le Space HF.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push vers le Space Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            "https://Fayzk92:${HF_TOKEN}@huggingface.co/spaces/Fayzk92/analyse-dataset-ecommerce" \
            HEAD:main
